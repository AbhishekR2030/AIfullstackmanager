# Render Blueprint - Multi-Service Deployment
# This deploys: Backend API + Celery Worker + Redis + PostgreSQL

services:
  # ============================================
  # 1. FASTAPI BACKEND (Web Service)
  # ============================================
  - type: web
    name: alphaseeker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: ./backend
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: alphaseeker-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: alphaseeker-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: HDFC_API_KEY
        sync: false
      - key: HDFC_API_SECRET
        sync: false
      - key: HDFC_ACCESS_TOKEN
        sync: false
    healthCheckPath: /
    autoDeploy: true

  # ============================================
  # 2. CELERY WORKER (Background Worker)
  # ============================================
  - type: worker
    name: alphaseeker-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    rootDir: ./backend
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: alphaseeker-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: alphaseeker-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
    autoDeploy: true

# ============================================
# DATABASES
# ============================================
databases:
  # PostgreSQL for persistent data (users, portfolio)
  - name: alphaseeker-db
    plan: free  # Free tier: 1GB storage, 90 day expiry
    databaseName: alphaseeker
    user: alphaseeker_user

  # Redis for caching and Celery
  - name: alphaseeker-redis
    plan: starter  # Free tier: 25MB
    ipAllowList: []  # Allow all IPs (internal only)
